<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Conflictos en África</title>

  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    body { margin:0; font-family: Arial; }
    #map { width:100%; height:90vh; }

    #controls {
      background:#111;
      color:white;
      padding:10px;
    }

    select, input {
      margin-left:10px;
    }
  </style>
</head>

<body>

<div id="controls">
  Tipo:
  <select id="filtro">
    <option value="todos">Todos</option>
    <option value="guerra">Guerra</option>
    <option value="terrorismo">Terrorismo</option>
  </select>

  Año:
  <input type="range" id="year" min="2020" max="2023" value="2023">
  <span id="yearLabel">2023</span>
</div>

<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://demotiles.maplibre.org/style.json',
  center: [10, 5],
  zoom: 2
});

let datos = [];
let markers = [];

fetch('data.json')
.then(res => res.json())
.then(data => {
  datos = data;
  actualizar();
});

document.getElementById("filtro").addEventListener("change", actualizar);

document.getElementById("year").addEventListener("input", e => {
  document.getElementById("yearLabel").innerText = e.target.value;
  actualizar();
});

function actualizar() {
  markers.forEach(m => m.remove());
  markers = [];

  const tipo = document.getElementById("filtro").value;
  const year = document.getElementById("year").value;

  datos.forEach(e => {
    const eventYear = new Date(e.fecha).getFullYear();

    if ((tipo === "todos" || e.tipo === tipo) && eventYear <= year) {

      const marker = new maplibregl.Marker({
        color: e.tipo === "guerra" ? "red" : "orange"
      })
      .setLngLat([e.lon, e.lat])
      .setPopup(new maplibregl.Popup().setHTML(
        `<b>${e.pais}</b><br>${e.tipo}<br>${e.actor}<br>${e.fecha}`
      ))
      .addTo(map);

      markers.push(marker);
    }
  });
}
</script>

</body>
</html>
