<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Conflictos en África</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Panel lateral de filtros -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🗺️ Conflictos en África</h1>
                <button class="close-sidebar" id="closeSidebar">✕</button>
            </div>
            
            <div class="filters">
                <!-- Filtro por tipo de conflicto -->
                <div class="filter-group">
                    <label for="tipoConflicto">Tipo de Conflicto:</label>
                    <select id="tipoConflicto" multiple>
                        <option value="">-- Todos --</option>
                        <option value="Terrorismo">Terrorismo</option>
                        <option value="Guerra">Guerra</option>
                        <option value="Disturbio Civil">Disturbio Civil</option>
                        <option value="Insurgencia">Insurgencia</option>
                        <option value="Conflicto Regional">Conflicto Regional</option>
                    </select>
                </div>
                
                <!-- Filtro por año -->
                <div class="filter-group">
                    <label for="annoInicio">Año Inicio (desde):</label>
                    <input type="number" id="annoInicio" min="1950" max="2026" placeholder="Ej: 2000">
                </div>
                
                <div class="filter-group">
                    <label for="annoFin">Año Fin (hasta):</label>
                    <input type="number" id="annoFin" min="1950" max="2026" placeholder="Ej: 2026">
                </div>
                
                <!-- Filtro por región -->
                <div class="filter-group">
                    <label for="region">Región:</label>
                    <select id="region" multiple>
                        <option value="">-- Todas --</option>
                        <option value="Norte">Norte</option>
                        <option value="Sur">Sur</option>
                        <option value="Este">Este</option>
                        <option value="Oeste">Oeste</option>
                        <option value="Centro">Centro</option>
                    </select>
                </div>
                
                <!-- Botones de control -->
                <div class="filter-buttons">
                    <button id="aplicarFiltros" class="btn btn-primary">Aplicar Filtros</button>
                    <button id="limpiarFiltros" class="btn btn-secondary">Limpiar</button>
                </div>
                
                <!-- Información de resultados -->
                <div class="results-info">
                    <p>Conflictos mostrados: <strong id="conflictCount">0</strong></p>
                </div>
                
                <!-- Lista de conflictos -->
                <div class="conflicts-list">
                    <h3>Conflictos Activos</h3>
                    <div id="conflictsList"></div>
                </div>
            </div>
        </aside>
        
        <!-- Botón para abrir sidebar en móviles -->
        <button class="toggle-sidebar" id="toggleSidebar">☰ Filtros</button>
        
        <!-- Mapa -->
        <main class="main-content">
            <div id="map"></div>
        </main>
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <!-- Script personalizado -->
    <script src="script.js"></script>
</body>
</html>
