<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa de Conflictos en África</title>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin:0; }
    #map { width:100%; height:100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://demotiles.maplibre.org/style.json',
  center: [10, 5],
  zoom: 2
});

// DATOS (puedes ampliar)
const eventos = [
  {lat:14.6, lon:-4.0, tipo:"terrorismo"},
  {lat:11.5, lon:13.0, tipo:"terrorismo"},
  {lat:2.0, lon:45.3, tipo:"terrorismo"},
  {lat:13.5, lon:39.5, tipo:"guerra"},
  {lat:15.6, lon:32.5, tipo:"guerra"}
];

eventos.forEach(e => {
  new maplibregl.Marker({
    color: e.tipo === "guerra" ? "red" : "orange"
  })
  .setLngLat([e.lon, e.lat])
  .addTo(map);
});
</script>

</body>
</html>
